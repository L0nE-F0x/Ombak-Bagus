# Build a sideloadable Android APK (WebView shell + bundled PWA).
# Trigger: Actions -> "Android APK" -> Run workflow
# Output: release asset Ombak-Bagus.apk (and workflow artifact)

name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        run: npm ci

      - name: Build web shell for Android assets
        run: npm run build:android-web

      - name: Copy web build into Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets/www
          cp -R dist-android/* mobile/android/app/src/main/assets/www/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        working-directory: mobile/android
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Assemble release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          cp "$APK" Ombak-Bagus.apk
          ls -lh Ombak-Bagus.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ombak-Bagus-apk
          path: Ombak-Bagus.apk

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Ombak-Bagus.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}