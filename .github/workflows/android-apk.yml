# Build a sideloadable Android APK (WebView shell + bundled PWA).
# Trigger: Actions -> "Android APK" -> Run workflow
# Output: artifact Ombak-Bagus.apk (signed for sideload)

name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build-tools for apksigner
        run: |
          yes | sdkmanager "build-tools;34.0.0" || true
          sdkmanager --list_installed | head -40

      - name: Ensure Android debug keystore exists
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          ls -la "$HOME/.android/debug.keystore"

      - name: Install frontend deps
        run: npm ci

      - name: Build web shell for Android assets
        run: npm run build:android-web

      - name: Copy web build into Android assets
        run: |
          mkdir -p mobile/android/app/src/main/assets/www
          cp -R dist-android/* mobile/android/app/src/main/assets/www/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        working-directory: mobile/android
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Assemble debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Sign APK with apksigner (required for install on modern Android)
        run: |
          set -euo pipefail
          RAW=$(find mobile/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "Raw APK: $RAW"
          ls -lh "$RAW"

          # Locate apksigner / zipalign
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          echo "Build-tools: $BT"
          APKSIGNER="$BT/apksigner"
          ZIPALIGN="$BT/zipalign"

          ALIGNED="Ombak-Bagus-aligned.apk"
          SIGNED="Ombak-Bagus.apk"

          "$ZIPALIGN" -f -p 4 "$RAW" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks "$HOME/.android/debug.keystore" \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out "$SIGNED" \
            "$ALIGNED"
          "$APKSIGNER" verify --verbose "$SIGNED"
          ls -lh "$SIGNED"
          echo "Signed APK ready"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ombak-Bagus-apk
          path: Ombak-Bagus.apk

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Ombak-Bagus.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}